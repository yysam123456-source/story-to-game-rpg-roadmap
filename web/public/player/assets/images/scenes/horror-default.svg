<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
  <defs>
    <!-- Sky gradient - dark red -->
    <linearGradient id="sky-horror" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0005"/>
      <stop offset="0.6" stop-color="#120008"/>
      <stop offset="1" stop-color="#0a0005"/>
    </linearGradient>
    <!-- Red moon glow -->
    <radialGradient id="blood-moon-glow" cx="0.78" cy="0.2" r="0.2">
      <stop offset="0" stop-color="rgba(200,40,40,0.4)"/>
      <stop offset="0.5" stop-color="rgba(150,20,20,0.15)"/>
      <stop offset="1" stop-color="transparent"/>
    </radialGradient>
    <!-- Red moon body -->
    <radialGradient id="blood-moon-body" cx="0.4" cy="0.35" r="0.5">
      <stop offset="0" stop-color="rgba(220,60,60,0.95)"/>
      <stop offset="0.6" stop-color="rgba(180,30,30,0.85)"/>
      <stop offset="1" stop-color="rgba(140,20,20,0.7)"/>
    </radialGradient>
    <!-- Ground fog -->
    <radialGradient id="ground-fog" cx="0.5" cy="0.85" r="0.6">
      <stop offset="0" stop-color="rgba(120,10,10,0.25)"/>
      <stop offset="0.7" stop-color="rgba(80,5,5,0.1)"/>
      <stop offset="1" stop-color="transparent"/>
    </radialGradient>
    <!-- Window glow -->
    <radialGradient id="window-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="rgba(200,150,80,0.5)"/>
      <stop offset="1" stop-color="transparent"/>
    </radialGradient>
    <!-- Blur filter -->
    <filter id="horror-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="horror-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Vignette -->
    <radialGradient id="vignette-horror" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0" stop-color="transparent"/>
      <stop offset="1" stop-color="rgba(0,0,0,0.5)"/>
    </radialGradient>
  </defs>

  <!-- Sky -->
  <rect width="1200" height="600" fill="url(#sky-horror)"/>

  <!-- Blood moon glow -->
  <circle cx="940" cy="120" r="180" fill="url(#blood-moon-glow)" filter="url(#horror-blur)"/>
  <!-- Blood moon -->
  <circle cx="940" cy="120" r="40" fill="url(#blood-moon-body)"/>
  <!-- Moon cracks -->
  <g stroke="rgba(100,10,10,0.5)" stroke-width="1.5" fill="none">
    <path d="M920 100 Q930 110 925 125"/>
    <path d="M950 108 Q945 118 955 130"/>
    <path d="M935 140 Q940 150 938 160"/>
  </g>

  <!-- Dead tree 1 (left) -->
  <g stroke="rgba(30,15,15,0.8)" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M120 520 L120 340"/>
    <path d="M120 400 L90 350"/>
    <path d="M90 350 L70 330"/>
    <path d="M90 350 L80 340"/>
    <path d="M120 370 L150 320"/>
    <path d="M150 320 L170 300"/>
    <path d="M150 320 L140 310"/>
    <path d="M120 450 L95 410"/>
    <path d="M95 410 L80 395"/>
  </g>

  <!-- Dead tree 2 (center-left) -->
  <g stroke="rgba(25,12,12,0.7)" stroke-width="2.5" fill="none" stroke-linecap="round">
    <path d="M380 520 L380 360"/>
    <path d="M380 410 L350 370"/>
    <path d="M350 370 L335 355"/>
    <path d="M350 370 L340 360"/>
    <path d="M380 380 L410 340"/>
    <path d="M410 340 L430 320"/>
    <path d="M410 340 L425 330"/>
    <path d="M380 440 L405 400"/>
  </g>

  <!-- Dead tree 3 (right) -->
  <g stroke="rgba(28,13,13,0.75)" stroke-width="2.8" fill="none" stroke-linecap="round">
    <path d="M800 520 L800 320"/>
    <path d="M800 380 L770 330"/>
    <path d="M770 330 L750 310"/>
    <path d="M770 330 L755 315"/>
    <path d="M800 350 L835 300"/>
    <path d="M835 300 L855 280"/>
    <path d="M835 300 L850 290"/>
    <path d="M800 420 L830 380"/>
    <path d="M830 380 L845 365"/>
  </g>

  <!-- Abandoned building silhouette -->
  <g fill="rgba(20,8,8,0.7)">
    <!-- Main structure -->
    <rect x="500" y="280" width="200" height="240"/>
    <!-- Broken roof -->
    <path d="M490 280 L600 230 L710 280Z"/>
    <!-- Roof damage -->
    <path d="M560 260 L590 230 L600 260Z" fill="rgba(10,5,5,0.9)"/>
    <!-- Windows with faint glow -->
    <rect x="530" y="310" width="30" height="40" rx="2" fill="rgba(200,150,80,0.08)"/>
    <rect x="530" y="310" width="30" height="40" rx="2" fill="url(#window-glow)"/>
    <rect x="640" y="310" width="30" height="40" rx="2" fill="rgba(200,150,80,0.05)"/>
    <rect x="640" y="310" width="30" height="40" rx="2" fill="url(#window-glow)"/>
    <rect x="580" y="380" width="40" height="50" rx="2" fill="rgba(10,5,5,0.5)"/>
    <!-- Door -->
    <rect x="575" y="470" width="50" height="50" rx="2" fill="rgba(10,5,5,0.6)"/>
  </g>

  <!-- Second smaller ruin -->
  <g fill="rgba(18,7,7,0.6)">
    <rect x="1050" y="350" width="100" height="170"/>
    <path d="M1040 350 L1100 320 L1160 350Z"/>
    <rect x="1075" y="380" width="20" height="25" fill="rgba(200,150,80,0.04)"/>
    <rect x="1075" y="380" width="20" height="25" fill="url(#window-glow)"/>
  </g>

  <!-- Tombstones scattered -->
  <g fill="rgba(35,15,15,0.6)">
    <rect x="200" y="475" width="30" height="45" rx="3"/>
    <rect x="260" y="480" width="25" height="40" rx="3"/>
    <rect x="320" y="478" width="28" height="42" rx="3"/>
    <rect x="680" y="470" width="32" height="50" rx="3"/>
    <rect x="740" y="482" width="22" height="38" rx="3"/>
    <rect x="1000" y="476" width="26" height="44" rx="3"/>
  </g>

  <!-- Ground red fog -->
  <rect width="1200" height="600" fill="url(#ground-fog)"/>

  <!-- Blood drops decoration -->
  <g fill="rgba(180,20,20,0.5)">
    <ellipse cx="450" cy="260" rx="2" ry="5"/>
    <ellipse cx="470" cy="280" rx="1.5" ry="4"/>
    <ellipse cx="460" cy="300" rx="1" ry="3"/>
    <ellipse cx="1050" cy="330" rx="2" ry="6"/>
    <ellipse cx="1070" cy="345" rx="1.5" ry="4"/>
  </g>

  <!-- Vignette overlay -->
  <rect width="1200" height="600" fill="url(#vignette-horror)"/>

  <!-- Ground line -->
  <line x1="0" y1="520" x2="1200" y2="520" stroke="rgba(60,10,10,0.3)" stroke-width="1"/>

  <!-- Watermark text -->
  <text x="600" y="590" text-anchor="middle" fill="rgba(180,40,40,0.25)" font-size="16" font-family="system-ui, serif" letter-spacing="8">恐怖 · 废墟</text>
</svg>
