<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
  <defs>
    <!-- Sky gradient -->
    <linearGradient id="sky-xianxia" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0a2e"/>
      <stop offset="0.5" stop-color="#151545"/>
      <stop offset="1" stop-color="#0a0a2e"/>
    </linearGradient>
    <!-- Moon glow -->
    <radialGradient id="moon-glow" cx="0.75" cy="0.2" r="0.25">
      <stop offset="0" stop-color="rgba(180,180,255,0.35)"/>
      <stop offset="0.4" stop-color="rgba(120,120,200,0.12)"/>
      <stop offset="1" stop-color="transparent"/>
    </radialGradient>
    <!-- Moon body -->
    <radialGradient id="moon-body" cx="0.4" cy="0.4" r="0.5">
      <stop offset="0" stop-color="rgba(230,230,255,0.95)"/>
      <stop offset="0.7" stop-color="rgba(180,180,220,0.8)"/>
      <stop offset="1" stop-color="rgba(140,140,200,0.6)"/>
    </radialGradient>
    <!-- Water reflection gradient -->
    <linearGradient id="water-reflect" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="rgba(20,20,60,0.8)"/>
      <stop offset="1" stop-color="rgba(10,10,40,0.95)"/>
    </linearGradient>
    <!-- Spirit particle glow -->
    <radialGradient id="spirit-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="rgba(180,160,255,0.8)"/>
      <stop offset="0.5" stop-color="rgba(140,120,220,0.3)"/>
      <stop offset="1" stop-color="transparent"/>
    </radialGradient>
    <!-- Brand gold glow -->
    <radialGradient id="gold-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="rgba(212,175,55,0.6)"/>
      <stop offset="0.5" stop-color="rgba(212,175,55,0.2)"/>
      <stop offset="1" stop-color="transparent"/>
    </radialGradient>
    <!-- Blur filter for glow effects -->
    <filter id="soft-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="wide-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="1200" height="600" fill="url(#sky-xianxia)"/>

  <!-- Moon glow (large) -->
  <circle cx="900" cy="120" r="200" fill="url(#moon-glow)" filter="url(#wide-glow)"/>
  <!-- Moon body -->
  <circle cx="900" cy="120" r="38" fill="url(#moon-body)"/>
  <circle cx="900" cy="120" r="38" fill="none" stroke="rgba(200,200,255,0.15)" stroke-width="2"/>

  <!-- Stars -->
  <g fill="rgba(200,200,255,0.7)">
    <circle cx="80" cy="40" r="1.2"><animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="200" cy="70" r="0.8"><animate attributeName="opacity" values="0.6;1;0.6" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="350" cy="30" r="1"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="500" cy="55" r="1.3"><animate attributeName="opacity" values="0.5;1;0.5" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="650" cy="25" r="0.9"><animate attributeName="opacity" values="0.4;0.8;0.4" dur="4.5s" repeatCount="indefinite"/></circle>
    <circle cx="150" cy="110" r="1.1"><animate attributeName="opacity" values="0.6;1;0.6" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="420" cy="95" r="0.7"><animate attributeName="opacity" values="0.3;0.7;0.3" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="750" cy="65" r="1.4"><animate attributeName="opacity" values="0.5;1;0.5" dur="4.2s" repeatCount="indefinite"/></circle>
    <circle cx="1050" cy="45" r="1"><animate attributeName="opacity" values="0.4;0.9;0.4" dur="3.8s" repeatCount="indefinite"/></circle>
    <circle cx="1150" cy="80" r="0.8"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="140" r="0.6"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="5.5s" repeatCount="indefinite"/></circle>
    <circle cx="550" cy="120" r="1.1"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.7s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Far mountains (most transparent, highest) -->
  <path d="M0 380 Q100 240 200 300 Q300 180 400 260 Q500 140 600 220 Q700 160 800 200 Q900 100 1000 180 Q1100 200 1200 250 L1200 420 L0 420Z"
        fill="rgba(40,35,80,0.25)"/>

  <!-- Mid mountains -->
  <path d="M0 420 Q80 300 180 340 Q280 220 380 290 Q480 200 560 270 Q660 180 760 240 Q860 210 960 280 Q1060 220 1200 300 L1200 460 L0 460Z"
        fill="rgba(30,28,70,0.4)"/>

  <!-- Near mountains (darkest, closest) -->
  <path d="M0 480 Q100 360 200 400 Q300 320 400 380 Q520 280 620 350 Q720 300 820 360 Q920 310 1050 370 Q1150 340 1200 380 L1200 520 L0 520Z"
        fill="rgba(20,18,55,0.55)"/>

  <!-- Pagoda silhouette on mountain peak -->
  <g transform="translate(580,210)" fill="rgba(15,12,45,0.7)">
    <!-- Base -->
    <rect x="-8" y="0" width="16" height="40" rx="1"/>
    <!-- First tier -->
    <path d="M-20 0 L0 -15 L20 0Z"/>
    <!-- Second tier -->
    <path d="M-16 -15 L0 -28 L16 -15Z"/>
    <!-- Third tier -->
    <path d="M-12 -28 L0 -38 L12 -28Z"/>
    <!-- Spire -->
    <line x1="0" y1="-38" x2="0" y2="-48" stroke="rgba(15,12,45,0.7)" stroke-width="2"/>
    <circle cx="0" cy="-50" r="3"/>
  </g>

  <!-- Water surface -->
  <rect x="0" y="520" width="1200" height="80" fill="url(#water-reflect)"/>
  <!-- Water ripple lines -->
  <g stroke="rgba(100,100,200,0.08)" stroke-width="1" fill="none">
    <line x1="100" y1="535" x2="200" y2="535"/>
    <line x1="400" y1="545" x2="550" y2="545"/>
    <line x1="700" y1="530" x2="800" y2="530"/>
    <line x1="250" y1="555" x2="350" y2="555"/>
    <line x1="600" y1="560" x2="720" y2="560"/>
    <line x1="850" y1="550" x2="950" y2="550"/>
    <line x1="150" y1="570" x2="280" y2="570"/>
    <line x1="900" y1="575" x2="1000" y2="575"/>
  </g>
  <!-- Moon reflection on water -->
  <ellipse cx="900" cy="540" rx="40" ry="8" fill="rgba(180,180,255,0.06)" filter="url(#wide-glow)"/>

  <!-- Floating spirit particles -->
  <g>
    <circle cx="200" cy="350" r="3" fill="url(#spirit-glow)">
      <animate attributeName="cy" values="350;320;350" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="300" r="2.5" fill="url(#spirit-glow)">
      <animate attributeName="cy" values="300;270;300" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.7;0.2" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="280" r="2" fill="url(#spirit-glow)">
      <animate attributeName="cy" values="280;250;280" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.9;0.4" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1000" cy="310" r="2.8" fill="url(#spirit-glow)">
      <animate attributeName="cy" values="310;275;310" dur="5.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="5.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="380" r="1.8" fill="url(#gold-glow)">
      <animate attributeName="cy" values="380;350;380" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="850" cy="330" r="2.2" fill="url(#gold-glow)">
      <animate attributeName="cy" values="330;295;330" dur="7.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="7.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Watermark text -->
  <text x="600" y="590" text-anchor="middle" fill="rgba(212,175,55,0.25)" font-size="16" font-family="system-ui, serif" letter-spacing="8">修仙 · 灵山</text>
</svg>
