<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
  <defs>
    <!-- Sky gradient - dark pink-black -->
    <linearGradient id="sky-palace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#100610"/>
      <stop offset="0.5" stop-color="#0a0408"/>
      <stop offset="1" stop-color="#0a0408"/>
    </linearGradient>
    <!-- Gold glow -->
    <radialGradient id="gold-radial" cx="0.5" cy="0.45" r="0.4">
      <stop offset="0" stop-color="rgba(212,175,55,0.25)"/>
      <stop offset="0.5" stop-color="rgba(212,175,55,0.08)"/>
      <stop offset="1" stop-color="transparent"/>
    </radialGradient>
    <!-- Lantern glow -->
    <radialGradient id="lantern-glow" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0" stop-color="rgba(255,100,50,0.6)"/>
      <stop offset="0.4" stop-color="rgba(255,80,30,0.25)"/>
      <stop offset="1" stop-color="transparent"/>
    </radialGradient>
    <!-- Lantern body -->
    <radialGradient id="lantern-body" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0" stop-color="rgba(255,120,60,0.9)"/>
      <stop offset="0.6" stop-color="rgba(220,60,30,0.7)"/>
      <stop offset="1" stop-color="rgba(180,40,20,0.5)"/>
    </radialGradient>
    <!-- Red curtain gradient -->
    <linearGradient id="curtain-left" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="rgba(160,20,40,0.6)"/>
      <stop offset="0.5" stop-color="rgba(120,15,30,0.4)"/>
      <stop offset="1" stop-color="rgba(80,10,20,0.2)"/>
    </linearGradient>
    <linearGradient id="curtain-right" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="rgba(160,20,40,0.6)"/>
      <stop offset="0.5" stop-color="rgba(120,15,30,0.4)"/>
      <stop offset="1" stop-color="rgba(80,10,20,0.2)"/>
    </linearGradient>
    <!-- Gold line shimmer -->
    <linearGradient id="gold-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="rgba(212,175,55,0.1)"/>
      <stop offset="0.5" stop-color="rgba(212,175,55,0.6)"/>
      <stop offset="1" stop-color="rgba(212,175,55,0.1)"/>
    </linearGradient>
    <!-- Ground -->
    <linearGradient id="palace-ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="rgba(20,10,15,0.9)"/>
      <stop offset="1" stop-color="rgba(10,5,8,0.95)"/>
    </linearGradient>
    <!-- Blur filters -->
    <filter id="palace-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <filter id="lantern-blur" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="15"/>
    </filter>
    <!-- Vignette -->
    <radialGradient id="vignette-palace" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="transparent"/>
      <stop offset="1" stop-color="rgba(0,0,0,0.45)"/>
    </radialGradient>
  </defs>

  <!-- Sky -->
  <rect width="1200" height="600" fill="url(#sky-palace)"/>

  <!-- Central gold ambient glow -->
  <circle cx="600" cy="270" r="400" fill="url(#gold-radial)" filter="url(#palace-blur)"/>

  <!-- Palace complex silhouette -->
  <g fill="rgba(25,12,18,0.8)">
    <!-- Main hall base -->
    <rect x="350" y="300" width="500" height="220" rx="2"/>

    <!-- Main hall roof (curved) -->
    <path d="M320 300 Q370 240 420 260 Q500 200 600 195 Q700 200 780 260 Q830 240 880 300Z"/>
    <!-- Roof ridge ornament -->
    <path d="M590 195 L600 175 L610 195Z"/>
    <circle cx="600" cy="172" r="5"/>

    <!-- Flying eaves left -->
    <path d="M320 300 Q290 290 270 275 Q260 268 255 260" stroke="rgba(25,12,18,0.8)" stroke-width="3" fill="none"/>
    <path d="M255 260 L250 258 L260 262Z" fill="rgba(212,175,55,0.5)"/>
    <!-- Flying eaves right -->
    <path d="M880 300 Q910 290 930 275 Q940 268 945 260" stroke="rgba(25,12,18,0.8)" stroke-width="3" fill="none"/>
    <path d="M945 260 L950 258 L940 262Z" fill="rgba(212,175,55,0.5)"/>

    <!-- Pillars (6 columns) -->
    <rect x="390" y="300" width="12" height="220" fill="rgba(35,18,25,0.7)"/>
    <rect x="470" y="300" width="12" height="220" fill="rgba(35,18,25,0.7)"/>
    <rect x="554" y="300" width="12" height="220" fill="rgba(35,18,25,0.6)"/>
    <rect x="634" y="300" width="12" height="220" fill="rgba(35,18,25,0.6)"/>
    <rect x="718" y="300" width="12" height="220" fill="rgba(35,18,25,0.7)"/>
    <rect x="798" y="300" width="12" height="220" fill="rgba(35,18,25,0.7)"/>

    <!-- Left annex building -->
    <rect x="100" y="360" width="200" height="160"/>
    <path d="M80 360 Q120 330 180 340 Q240 310 300 340 Q320 335 320 360Z"/>
    <rect x="130" y="360" width="8" height="160" fill="rgba(35,18,25,0.6)"/>
    <rect x="200" y="360" width="8" height="160" fill="rgba(35,18,25,0.6)"/>
    <rect x="270" y="360" width="8" height="160" fill="rgba(35,18,25,0.6)"/>

    <!-- Right annex building -->
    <rect x="900" y="360" width="200" height="160"/>
    <path d="M880 360 Q920 330 980 340 Q1040 310 1100 340 Q1120 335 1120 360Z"/>
    <rect x="930" y="360" width="8" height="160" fill="rgba(35,18,25,0.6)"/>
    <rect x="1000" y="360" width="8" height="160" fill="rgba(35,18,25,0.6)"/>
    <rect x="1070" y="360" width="8" height="160" fill="rgba(35,18,25,0.6)"/>

    <!-- Steps -->
    <path d="M450 520 L450 530 L440 540 L760 540 L750 530 L750 520Z" fill="rgba(30,15,22,0.6)"/>
  </g>

  <!-- Gold decorative lines on roof -->
  <g stroke="url(#gold-line)" stroke-width="1.5" fill="none">
    <path d="M370 270 Q500 230 600 228 Q700 230 830 270"/>
    <path d="M390 285 Q500 250 600 248 Q700 250 810 285"/>
    <!-- Annex roof lines -->
    <path d="M110 355 Q200 335 300 355"/>
    <path d="M900 355 Q1000 335 1100 355"/>
  </g>

  <!-- Red curtains left -->
  <path d="M0 150 Q30 145 40 200 Q50 300 35 400 Q25 480 30 520 L0 520Z" fill="url(#curtain-left)"/>
  <path d="M40 200 Q50 300 35 400" stroke="rgba(180,30,50,0.15)" stroke-width="1" fill="none"/>
  <path d="M30 250 Q38 320 32 400" stroke="rgba(180,30,50,0.1)" stroke-width="0.8" fill="none"/>

  <!-- Red curtains right -->
  <path d="M1200 150 Q1170 145 1160 200 Q1150 300 1165 400 Q1175 480 1170 520 L1200 520Z" fill="url(#curtain-right)"/>
  <path d="M1160 200 Q1150 300 1165 400" stroke="rgba(180,30,50,0.15)" stroke-width="1" fill="none"/>
  <path d="M1170 250 Q1162 320 1168 400" stroke="rgba(180,30,50,0.1)" stroke-width="0.8" fill="none"/>

  <!-- Palace lantern 1 (left) -->
  <g>
    <line x1="420" y1="260" x2="420" y2="300" stroke="rgba(180,120,40,0.4)" stroke-width="1"/>
    <circle cx="420" cy="255" r="35" fill="url(#lantern-glow)" filter="url(#lantern-blur)"/>
    <ellipse cx="420" cy="255" rx="12" ry="18" fill="url(#lantern-body)"/>
    <rect x="416" y="237" width="8" height="4" rx="1" fill="rgba(212,175,55,0.5)"/>
    <rect x="416" y="269" width="8" height="4" rx="1" fill="rgba(212,175,55,0.5)"/>
    <line x1="420" y1="237" x2="420" y2="230" stroke="rgba(180,120,40,0.4)" stroke-width="0.8"/>
  </g>

  <!-- Palace lantern 2 (right) -->
  <g>
    <line x1="780" y1="260" x2="780" y2="300" stroke="rgba(180,120,40,0.4)" stroke-width="1"/>
    <circle cx="780" cy="255" r="35" fill="url(#lantern-glow)" filter="url(#lantern-blur)"/>
    <ellipse cx="780" cy="255" rx="12" ry="18" fill="url(#lantern-body)"/>
    <rect x="776" y="237" width="8" height="4" rx="1" fill="rgba(212,175,55,0.5)"/>
    <rect x="776" y="269" width="8" height="4" rx="1" fill="rgba(212,175,55,0.5)"/>
    <line x1="780" y1="237" x2="780" y2="230" stroke="rgba(180,120,40,0.4)" stroke-width="0.8"/>
  </g>

  <!-- Ground -->
  <rect x="0" y="520" width="1200" height="80" fill="url(#palace-ground)"/>

  <!-- Ground grid pattern hint -->
  <g stroke="rgba(212,175,55,0.04)" stroke-width="0.5" fill="none">
    <line x1="200" y1="520" x2="200" y2="600"/>
    <line x1="400" y1="520" x2="400" y2="600"/>
    <line x1="600" y1="520" x2="600" y2="600"/>
    <line x1="800" y1="520" x2="800" y2="600"/>
    <line x1="1000" y1="520" x2="1000" y2="600"/>
    <line x1="0" y1="550" x2="1200" y2="550"/>
    <line x1="0" y1="575" x2="1200" y2="575"/>
  </g>

  <!-- Vignette overlay -->
  <rect width="1200" height="600" fill="url(#vignette-palace)"/>

  <!-- Watermark text -->
  <text x="600" y="590" text-anchor="middle" fill="rgba(212,175,55,0.25)" font-size="16" font-family="system-ui, serif" letter-spacing="8">宫斗 · 金殿</text>
</svg>
