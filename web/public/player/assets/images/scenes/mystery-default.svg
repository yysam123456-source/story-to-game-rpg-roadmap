<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
  <defs>
    <!-- Sky gradient - deep blue-black -->
    <linearGradient id="sky-mystery" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#050510"/>
      <stop offset="0.5" stop-color="#0a0a18"/>
      <stop offset="1" stop-color="#050510"/>
    </linearGradient>
    <!-- Street lamp glow -->
    <radialGradient id="lamp-glow" cx="0.5" cy="0.3" r="0.5">
      <stop offset="0" stop-color="rgba(255,220,120,0.5)"/>
      <stop offset="0.3" stop-color="rgba(255,200,100,0.2)"/>
      <stop offset="1" stop-color="transparent"/>
    </radialGradient>
    <!-- Window warm light -->
    <radialGradient id="win-light" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="rgba(255,220,100,0.7)"/>
      <stop offset="1" stop-color="transparent"/>
    </radialGradient>
    <!-- Ground wet reflection -->
    <linearGradient id="wet-ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="rgba(15,15,30,0.9)"/>
      <stop offset="1" stop-color="rgba(8,8,20,0.98)"/>
    </linearGradient>
    <!-- Blur filters -->
    <filter id="lamp-blur" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="15"/>
    </filter>
    <filter id="rain-blur" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1"/>
    </filter>
    <!-- Vignette -->
    <radialGradient id="vignette-mystery" cx="0.5" cy="0.5" r="0.65">
      <stop offset="0" stop-color="transparent"/>
      <stop offset="1" stop-color="rgba(0,0,0,0.55)"/>
    </radialGradient>
  </defs>

  <!-- Sky -->
  <rect width="1200" height="600" fill="url(#sky-mystery)"/>

  <!-- City skyline silhouette - 12 buildings of varying heights -->
  <g fill="rgba(10,10,20,0.85)">
    <!-- Building 1 - short wide -->
    <rect x="20" y="340" width="70" height="180"/>
    <rect x="25" y="335" width="60" height="5" rx="1"/>
    <!-- Building 2 - tall narrow -->
    <rect x="100" y="230" width="50" height="290"/>
    <rect x="120" y="225" width="10" height="5"/>
    <!-- Building 3 - medium -->
    <rect x="160" y="290" width="80" height="230"/>
    <path d="M155 290 L200 265 L245 290Z"/>
    <!-- Building 4 - tallest -->
    <rect x="250" y="180" width="55" height="340"/>
    <path d="M270 180 L277 160 L285 180Z"/>
    <!-- Building 5 - medium tall -->
    <rect x="315" y="250" width="65" height="270"/>
    <rect x="340" y="240" width="15" height="10"/>
    <!-- Building 6 - short -->
    <rect x="390" y="360" width="55" height="160"/>
    <!-- Building 7 - tall -->
    <rect x="455" y="210" width="60" height="310"/>
    <path d="M450 210 L485 185 L520 210Z"/>
    <!-- Building 8 - medium -->
    <rect x="525" y="300" width="70" height="220"/>
    <!-- Building 9 - very tall -->
    <rect x="605" y="170" width="50" height="350"/>
    <path d="M625 170 L630 148 L635 170Z"/>
    <!-- Building 10 - medium -->
    <rect x="665" y="280" width="75" height="240"/>
    <rect x="700" y="270" width="10" height="10"/>
    <!-- Building 11 - tall -->
    <rect x="750" y="220" width="55" height="300"/>
    <!-- Building 12 - medium short -->
    <rect x="815" y="320" width="65" height="200"/>
    <!-- Building 13 -->
    <rect x="890" y="270" width="60" height="250"/>
    <path d="M885 270 L920 245 L955 270Z"/>
    <!-- Building 14 -->
    <rect x="960" y="310" width="50" height="210"/>
    <!-- Building 15 - edge -->
    <rect x="1020" y="260" width="80" height="260"/>
    <rect x="1030" y="255" width="60" height="5" rx="1"/>
    <!-- Building 16 -->
    <rect x="1110" y="340" width="90" height="180"/>
  </g>

  <!-- Lit windows (yellow small squares) scattered across buildings -->
  <g>
    <rect x="115" y="260" width="6" height="8" fill="rgba(255,220,100,0.6)"/>
    <rect x="115" y="260" width="6" height="8" fill="url(#win-light)"/>
    <rect x="130" y="310" width="6" height="8" fill="rgba(255,220,100,0.4)"/>

    <rect x="270" y="210" width="6" height="8" fill="rgba(255,220,100,0.5)"/>
    <rect x="270" y="210" width="6" height="8" fill="url(#win-light)"/>
    <rect x="285" y="260" width="6" height="8" fill="rgba(255,220,100,0.35)"/>
    <rect x="270" y="340" width="6" height="8" fill="rgba(255,220,100,0.45)"/>

    <rect x="335" y="290" width="6" height="8" fill="rgba(255,220,100,0.4)"/>

    <rect x="470" y="250" width="6" height="8" fill="rgba(255,220,100,0.55)"/>
    <rect x="470" y="250" width="6" height="8" fill="url(#win-light)"/>
    <rect x="500" y="320" width="6" height="8" fill="rgba(255,220,100,0.3)"/>

    <rect x="615" y="200" width="6" height="8" fill="rgba(255,220,100,0.5)"/>
    <rect x="615" y="200" width="6" height="8" fill="url(#win-light)"/>
    <rect x="630" y="280" width="6" height="8" fill="rgba(255,220,100,0.35)"/>
    <rect x="615" y="350" width="6" height="8" fill="rgba(255,220,100,0.4)"/>

    <rect x="690" y="320" width="6" height="8" fill="rgba(255,220,100,0.45)"/>

    <rect x="765" y="260" width="6" height="8" fill="rgba(255,220,100,0.5)"/>
    <rect x="765" y="260" width="6" height="8" fill="url(#win-light)"/>

    <rect x="905" y="310" width="6" height="8" fill="rgba(255,220,100,0.4)"/>

    <rect x="1040" y="300" width="6" height="8" fill="rgba(255,220,100,0.45)"/>
    <rect x="1060" y="340" width="6" height="8" fill="rgba(255,220,100,0.3)"/>
  </g>

  <!-- Street lamp 1 -->
  <g>
    <rect x="298" y="380" width="4" height="140" fill="rgba(40,40,50,0.8)"/>
    <path d="M292 380 Q300 370 308 380" stroke="rgba(40,40,50,0.8)" stroke-width="2" fill="none"/>
    <circle cx="300" cy="375" r="25" fill="url(#lamp-glow)" filter="url(#lamp-blur)"/>
    <circle cx="300" cy="375" r="5" fill="rgba(255,220,120,0.8)"/>
  </g>

  <!-- Street lamp 2 -->
  <g>
    <rect x="848" y="380" width="4" height="140" fill="rgba(40,40,50,0.8)"/>
    <path d="M842 380 Q850 370 858 380" stroke="rgba(40,40,50,0.8)" stroke-width="2" fill="none"/>
    <circle cx="850" cy="375" r="25" fill="url(#lamp-glow)" filter="url(#lamp-blur)"/>
    <circle cx="850" cy="375" r="5" fill="rgba(255,220,120,0.8)"/>
  </g>

  <!-- Rain lines pattern -->
  <g stroke="rgba(100,120,160,0.12)" stroke-width="0.8" filter="url(#rain-blur)">
    <line x1="50" y1="0" x2="40" y2="120"/>
    <line x1="120" y1="20" x2="110" y2="150"/>
    <line x1="200" y1="10" x2="190" y2="140"/>
    <line x1="280" y1="30" x2="270" y2="160"/>
    <line x1="360" y1="0" x2="350" y2="130"/>
    <line x1="440" y1="15" x2="430" y2="145"/>
    <line x1="520" y1="5" x2="510" y2="135"/>
    <line x1="600" y1="25" x2="590" y2="155"/>
    <line x1="680" y1="10" x2="670" y2="140"/>
    <line x1="760" y1="35" x2="750" y2="165"/>
    <line x1="840" y1="0" x2="830" y2="130"/>
    <line x1="920" y1="20" x2="910" y2="150"/>
    <line x1="1000" y1="8" x2="990" y2="138"/>
    <line x1="1080" y1="30" x2="1070" y2="160"/>
    <line x1="1160" y1="12" x2="1150" y2="142"/>
    <line x1="80" y1="100" x2="70" y2="250"/>
    <line x1="170" y1="110" x2="160" y2="260"/>
    <line x1="250" y1="120" x2="240" y2="270"/>
    <line x1="340" y1="105" x2="330" y2="255"/>
    <line x1="420" y1="115" x2="410" y2="265"/>
    <line x1="500" y1="100" x2="490" y2="250"/>
    <line x1="580" y1="125" x2="570" y2="275"/>
    <line x1="660" y1="108" x2="650" y2="258"/>
    <line x1="740" y1="118" x2="730" y2="268"/>
    <line x1="820" y1="102" x2="810" y2="252"/>
    <line x1="900" y1="112" x2="890" y2="262"/>
    <line x1="980" y1="122" x2="970" y2="272"/>
    <line x1="1060" y1="105" x2="1050" y2="255"/>
    <line x1="1140" y1="115" x2="1130" y2="265"/>
    <line x1="150" y1="200" x2="140" y2="380"/>
    <line x1="310" y1="210" x2="300" y2="390"/>
    <line x1="470" y1="195" x2="460" y2="375"/>
    <line x1="630" y1="205" x2="620" y2="385"/>
    <line x1="790" y1="200" x2="780" y2="380"/>
    <line x1="950" y1="195" x2="940" y2="375"/>
    <line x1="1110" y1="210" x2="1100" y2="390"/>
  </g>

  <!-- Wet ground -->
  <rect x="0" y="520" width="1200" height="80" fill="url(#wet-ground)"/>

  <!-- Ground reflections (lamp and window lights reflected) -->
  <ellipse cx="300" cy="545" rx="30" ry="6" fill="rgba(255,220,120,0.06)" filter="url(#lamp-blur)"/>
  <ellipse cx="850" cy="545" rx="30" ry="6" fill="rgba(255,220,120,0.06)" filter="url(#lamp-blur)"/>
  <ellipse cx="470" cy="540" rx="15" ry="4" fill="rgba(255,220,100,0.04)" filter="url(#lamp-blur)"/>
  <ellipse cx="615" cy="540" rx="15" ry="4" fill="rgba(255,220,100,0.04)" filter="url(#lamp-blur)"/>

  <!-- Puddle reflections -->
  <g fill="rgba(80,100,140,0.05)">
    <ellipse cx="200" cy="550" rx="40" ry="8"/>
    <ellipse cx="550" cy="555" rx="50" ry="10"/>
    <ellipse cx="1000" cy="548" rx="45" ry="9"/>
  </g>

  <!-- Vignette overlay -->
  <rect width="1200" height="600" fill="url(#vignette-mystery)"/>

  <!-- Watermark text -->
  <text x="600" y="590" text-anchor="middle" fill="rgba(80,120,180,0.25)" font-size="16" font-family="system-ui, serif" letter-spacing="8">悬疑 · 雨夜</text>
</svg>
