<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a1a1a"/>
      <stop offset="1" stop-color="#050d0d"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <!-- Grid lines (investigation board) -->
  <line x1="100" y1="50" x2="100" y2="350" stroke="rgba(50,80,80,0.2)" stroke-width="1"/>
  <line x1="250" y1="50" x2="250" y2="350" stroke="rgba(50,80,80,0.2)" stroke-width="1"/>
  <line x1="550" y1="50" x2="550" y2="350" stroke="rgba(50,80,80,0.2)" stroke-width="1"/>
  <line x1="700" y1="50" x2="700" y2="350" stroke="rgba(50,80,80,0.2)" stroke-width="1"/>
  <!-- Evidence cards -->
  <rect x="150" y="100" width="80" height="100" fill="rgba(40,60,60,0.3)" rx="4" stroke="rgba(80,120,120,0.2)" stroke-width="1"/>
  <rect x="350" y="80" width="80" height="100" fill="rgba(40,60,60,0.3)" rx="4" stroke="rgba(80,120,120,0.2)" stroke-width="1"/>
  <rect x="580" y="150" width="80" height="100" fill="rgba(40,60,60,0.3)" rx="4" stroke="rgba(80,120,120,0.2)" stroke-width="1"/>
  <!-- Connection lines -->
  <line x1="230" y1="150" x2="350" y2="130" stroke="rgba(100,200,100,0.15)" stroke-width="1" stroke-dasharray="4"/>
  <line x1="430" y1="130" x2="580" y2="200" stroke="rgba(100,200,100,0.15)" stroke-width="1" stroke-dasharray="4"/>
  <text x="400" y="380" text-anchor="middle" fill="rgba(80,150,150,0.3)" font-size="14" font-family="system-ui">悬疑 · 证物室</text>
</svg>
