<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a1a0a"/>
      <stop offset="1" stop-color="#1a1005"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <!-- Ruined buildings -->
  <rect x="50" y="200" width="100" height="200" fill="rgba(60,40,20,0.3)" rx="2"/>
  <rect x="200" y="250" width="120" height="150" fill="rgba(50,35,15,0.3)" rx="2"/>
  <rect x="500" y="220" width="80" height="180" fill="rgba(55,38,18,0.3)" rx="2"/>
  <rect x="650" y="180" width="130" height="220" fill="rgba(60,40,20,0.3)" rx="2"/>
  <!-- Rubble -->
  <ellipse cx="400" cy="380" rx="450" ry="30" fill="rgba(80,50,20,0.15)"/>
  <!-- Smoke -->
  <circle cx="300" cy="150" r="50" fill="rgba(100,80,50,0.05)"/>
  <circle cx="500" cy="120" r="70" fill="rgba(100,80,50,0.04)"/>
  <text x="400" y="380" text-anchor="middle" fill="rgba(180,120,60,0.3)" font-size="14" font-family="system-ui">末日 · 废墟</text>
</svg>
